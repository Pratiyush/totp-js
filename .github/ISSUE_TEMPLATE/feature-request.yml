name: Feature Request
description: Suggest a feature for totp-js
labels: ["enhancement"]
body:
  - type: textarea
    id: description
    attributes:
      label: Feature Description
      placeholder: "What would you like to see?"
    validations:
      required: true
  - type: textarea
    id: use-case
    attributes:
      label: Use Case
      placeholder: "Why do you need this?"
    validations:
      required: true
  - type: textarea
    id: alternatives
    attributes:
      label: Alternatives Considered
      placeholder: "What are you doing today as a workaround?"
