name: Release & Publish

on:
  pull_request:
    branches: [master]
    types: [closed]

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  release:
    if: github.event.pull_request.merged == true
    runs-on: ubuntu-latest
    permissions:
      contents: write
      id-token: write
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0
          token: ${{ secrets.GITHUB_TOKEN }}

      - uses: actions/setup-node@v6
        with:
          node-version: 24
          registry-url: 'https://registry.npmjs.org'
          cache: 'npm'

      - run: npm ci
      - run: npm run typecheck
      - run: npm run test:coverage
      - run: npm run build

      - name: Calculate next version
        id: version
        run: |
          CURRENT=$(node -p "require('./package.json').version")
          MAJOR=$(echo $CURRENT | cut -d. -f1)
          MINOR=$(echo $CURRENT | cut -d. -f2)
          PATCH=$(echo $CURRENT | cut -d. -f3)
          NEXT="${MAJOR}.${MINOR}.$((PATCH + 1))"
          echo "CURRENT=${CURRENT}" >> $GITHUB_OUTPUT
          echo "NEXT=${NEXT}" >> $GITHUB_OUTPUT
          echo "Bumping ${CURRENT} → ${NEXT}"

      - name: Bump version
        run: npm version ${{ steps.version.outputs.NEXT }} --no-git-tag-version

      - name: Commit version bump and create tag
        run: |
          git config user.name "Pratiyush"
          git config user.email "pratiyush1@gmail.com"
          git add package.json package-lock.json
          git commit -m "chore: release v${{ steps.version.outputs.NEXT }}"
          git tag "v${{ steps.version.outputs.NEXT }}"
          git push origin master --tags

      - name: Publish to npm
        run: npm publish --provenance --access public

      - name: Create GitHub Release
        uses: ncipollo/release-action@v1
        with:
          tag: v${{ steps.version.outputs.NEXT }}
          name: v${{ steps.version.outputs.NEXT }}
          generateReleaseNotes: true
          body: |
            ## Install

            ```bash
            npm install @authcraft/totp-js@${{ steps.version.outputs.NEXT }}
            ```
          draft: false
          prerelease: ${{ startsWith(steps.version.outputs.NEXT, '0.') }}
